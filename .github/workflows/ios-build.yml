name: Build unsigned iOS IPA

# Builds an UNSIGNED .ipa on a macOS runner. Sideloadly (or AltStore) signs it
# on your PC with your own Apple ID, so no certificates or secrets live in CI.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web app and sync Capacitor
        run: |
          npm run build
          npx cap sync ios
          node scripts/fix-ios-spm-paths.mjs

      - name: Build unsigned .app
        run: |
          set -o pipefail
          xcodebuild \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO \
            clean build | xcbeautify || \
          xcodebuild \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO \
            clean build

      - name: Package into an .ipa
        run: |
          APP_PATH="build/Build/Products/Release-iphoneos/App.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "Build product not found at $APP_PATH" >&2
            find build -name "*.app" -maxdepth 6 -print >&2 || true
            exit 1
          fi
          rm -rf Payload ResumeMaker.ipa
          mkdir -p Payload
          cp -R "$APP_PATH" "Payload/App.app"
          zip -qr ResumeMaker.ipa Payload
          echo "Created ResumeMaker.ipa:"
          ls -lh ResumeMaker.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ResumeMaker-unsigned-ipa
          path: ResumeMaker.ipa
          if-no-files-found: error
          retention-days: 30

      # ---- AltStore distribution ----
      # Publish the IPA to a GitHub Release and generate an AltStore source so
      # AltStore can install it and auto-refresh the 7-day signature over Wi-Fi.
      - name: Generate AltStore source (apps.json)
        run: |
          VERSION="1.0.${{ github.run_number }}"
          DATE="$(date -u +%Y-%m-%d)"
          SIZE="$(stat -f%z ResumeMaker.ipa)"
          REPO="${{ github.repository }}"
          IPA_URL="https://github.com/${REPO}/releases/latest/download/ResumeMaker.ipa"
          ICON_URL="https://raw.githubusercontent.com/${REPO}/main/public/assets/ResumeMaker.png"
          SOURCE_URL="https://github.com/${REPO}/releases/latest/download/apps.json"
          cat > apps.json <<JSON
          {
            "name": "Resume Maker (CSAtechnologies)",
            "identifier": "com.csatechnologies.resumemaker.source",
            "sourceURL": "${SOURCE_URL}",
            "apps": [
              {
                "name": "Resume Maker",
                "bundleIdentifier": "com.resumemaker.mobile",
                "developerName": "CSAtechnologies",
                "subtitle": "Build and export resumes on iPhone.",
                "localizedDescription": "Edit, preview, and export resumes to PDF on your iPhone.",
                "iconURL": "${ICON_URL}",
                "tintColor": "1a1a2e",
                "category": "productivity",
                "screenshotURLs": [],
                "version": "${VERSION}",
                "versionDate": "${DATE}",
                "downloadURL": "${IPA_URL}",
                "size": ${SIZE},
                "versions": [
                  {
                    "version": "${VERSION}",
                    "date": "${DATE}",
                    "localizedDescription": "Automated build ${VERSION}.",
                    "downloadURL": "${IPA_URL}",
                    "size": ${SIZE},
                    "minOSVersion": "15.0"
                  }
                ]
              }
            ],
            "news": []
          }
          JSON
          echo "Generated apps.json for version ${VERSION} (size ${SIZE} bytes)"
          cat apps.json

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="1.0.${{ github.run_number }}"
          gh release create "v${VERSION}" ResumeMaker.ipa apps.json \
            --title "Resume Maker ${VERSION}" \
            --notes "Automated unsigned build ${VERSION}. Install via AltStore source or Sideloadly." \
            --latest
